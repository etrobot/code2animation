<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .ranking-container {
            position: absolute;
            top: 650px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table-row {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 40px;
            font-size: 35px;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-header {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 800;
            color: #94a3b8;
        }

        .col-1 {
            flex: 2;
        }

        .col-2 {
            flex: 1;
            text-align: center;
            color: #fbbf24;
        }

        .col-3 {
            flex: 1;
            text-align: center;
            color: #4ade80;
        }

        .highlight-row {
            background: rgba(236, 72, 153, 0.15);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="ranking-container">
        <div class="table-row table-header">
            <div class="col-1">项目分类</div>
            <div class="col-2">难度</div>
            <div class="col-3">收入潜力</div>
        </div>
        <div class="table-row">
            <div class="col-1">AI 内容矩阵</div>
            <div class="col-2">低</div>
            <div class="col-3">中</div>
        </div>
        <div class="table-row">
            <div class="col-1">SEO 网站农场</div>
            <div class="col-2">中</div>
            <div class="col-3">高</div>
        </div>
        <div class="table-row highlight-row">
            <div class="col-1">AI 外包工作室</div>
            <div class="col-2">中</div>
            <div class="col-3" style="color:#22c55e">极高</div>
        </div>
        <div class="table-row highlight-row">
            <div class="col-1">AI SaaS 运营</div>
            <div class="col-2">高</div>
            <div class="col-3" style="color:#22c55e">极高</div>
        </div>
    </div>
</body>

</html>
