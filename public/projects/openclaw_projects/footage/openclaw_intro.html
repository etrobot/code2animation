<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* Animation relative to t */
            --start: 0.2;
            --duration: 0.8;
            --p: clamp(0, calc((var(--t) - var(--start)) / var(--duration)), 1);
            --ease-out: calc(1 - (1 - var(--p)) * (1 - var(--p)));

            opacity: var(--ease-out);
            transform: translateY(calc((1 - var(--ease-out)) * 40px));
        }

        .title {
            font-size: 80px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 45px;
            font-weight: 500;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .highlight {
            color: #60a5fa;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">2026年<br>最真实的5个<br>OpenClaw 赚钱项目</h1>
        <p class="subtitle">这些并不是“概念”<br><br>而是开发者已经<span class="highlight">跑通的模式</span></p>
    </div>
</body>

</html>
