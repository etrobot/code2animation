<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .concept-container {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .equation {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .sub-equation {
            font-size: 50px;
            color: #cbd5e1;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="concept-container">
        <div class="equation">AI Agent = 自动员工</div>
        <div class="sub-equation">赚钱项目 = 自动员工 + 生意模型</div>
    </div>
</body>

</html>
