<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .header-container {
            position: absolute;
            top: 200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            font-size: 70px;
            font-weight: 800;
            color: #f472b6;
            margin-bottom: 20px;
        }

        .title {
            font-size: 85px;
            font-weight: bold;
            background: linear-gradient(to right, #ffffff, #fbcfe8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <div class="header">04</div>
        <div class="title">AI 线索抓取 (B2B赚钱)</div>
    </div>
</body>

</html>
