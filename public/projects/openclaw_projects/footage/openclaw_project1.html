<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 85%;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 40px;
            padding: 60px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(99, 102, 241, 0.2);

            --start: 0.1;
            --duration: 0.8;
            --p: clamp(0, calc((var(--t) - var(--start)) / var(--duration)), 1);
            --ease-out: calc(1 - (1 - var(--p)) * (1 - var(--p)));

            opacity: var(--ease-out);
            transform: scale(calc(0.9 + 0.1 * var(--ease-out)));
        }

        .header {
            font-size: 70px;
            font-weight: 800;
            color: #818cf8;
            margin-bottom: 20px;
        }

        .title {
            font-size: 85px;
            font-weight: bold;
            margin-bottom: 50px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .image-container {
            width: 100%;
            height: 600px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);

            --img-start: 1;
            --img-dur: 1;
            --img-p: clamp(0, calc((var(--t) - var(--img-start)) / var(--img-dur)), 1);
            --img-ease: calc(1 - (1 - var(--img-p)) * (1 - var(--img-p)));

            opacity: var(--img-ease);
            transform: translateY(calc((1 - var(--img-ease)) * 30px));
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;

            --stats-start: 2;
            --stats-dur: 0.8;
            --stats-p: clamp(0, calc((var(--t) - var(--stats-start)) / var(--stats-dur)), 1);
            --stats-ease: calc(1 - (1 - var(--stats-p)) * (1 - var(--stats-p)));

            opacity: var(--stats-ease);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            width: 45%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 60px;
            font-weight: 800;
            color: #34d399;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 35px;
            color: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">01</div>
        <div class="title">AI 内容自动化矩阵</div>

        <div class="image-container">
            <img src="https://n8niostorageaccount.blob.core.windows.net/n8nio-strapi-blobs-prod/assets/image_4ba3c278ed.png"
                alt="Automation">
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value">50万</div>
                <div class="stat-label">5天播放量</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">$700</div>
                <div class="stat-label">月收入 (MRR)</div>
            </div>
        </div>
    </div>
</body>

</html>
