<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .revenue-container {
            position: absolute;
            top: 1300px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .revenue-box {
            background: rgba(15, 23, 42, 0.9);
            border: 3px solid #10b981;
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.4);
        }

        .revenue-value {
            font-size: 80px;
            font-weight: 900;
            color: #34d399;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .revenue-label {
            font-size: 45px;
            color: #f8fafc;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="revenue-container">
        <div class="revenue-box">
            <div class="revenue-value">$10k / 月</div>
            <div class="revenue-label">1个人 • 1000个用户</div>
        </div>
    </div>
</body>

</html>
