<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .grid-container {
            position: absolute;
            top: 550px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 40px;
            padding: 60px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(168, 85, 247, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            font-size: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .icon {
            font-size: 70px;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="grid-item">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em;">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg></span> 代写 SEO 文章
        </div>
        <div class="grid-item">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em;">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg></span> 处理客户支持
        </div>
        <div class="grid-item">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em;">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg></span> 生成营销文案
        </div>
        <div class="grid-item">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em;">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg></span> 自动数据分析
        </div>
    </div>
</body>

</html>
