<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            /* Animation relative to t */
            --start: 0.2;
            --duration: 0.8;
            --p: clamp(0, calc((var(--t) - var(--start)) / var(--duration)), 1);
            --ease-out: calc(1 - (1 - var(--p)) * (1 - var(--p)));

            opacity: var(--ease-out);
            transform: translateY(calc((1 - var(--ease-out)) * 40px));
        }

        .core-concept {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .equation {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .sub-equation {
            font-size: 50px;
            color: #cbd5e1;
            font-weight: 600;
        }

        .ranking-table {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);

            --tbl-start: 1.5;
            --tbl-dur: 0.8;
            --tbl-p: clamp(0, calc((var(--t) - var(--tbl-start)) / var(--tbl-dur)), 1);
            --tbl-ease: calc(1 - (1 - var(--tbl-p)) * (1 - var(--tbl-p)));

            opacity: var(--tbl-ease);
        }

        .table-row {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 40px;
            font-size: 35px;
        }

        .table-header {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 800;
            color: #94a3b8;
        }

        .col-1 {
            flex: 2;
        }

        .col-2 {
            flex: 1;
            text-align: center;
            color: #fbbf24;
        }

        .col-3 {
            flex: 1;
            text-align: center;
            color: #4ade80;
        }

        .highlight-row {
            background: rgba(236, 72, 153, 0.15);
            font-weight: bold;
        }

        .call-to-action {
            text-align: center;
            font-size: 50px;
            font-weight: 800;
            color: white;
            margin-top: 40px;
            padding: 40px;
            border-radius: 30px;
            background: #ef4444;
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.4);

            --cta-start: 3;
            --cta-dur: 0.5;
            --cta-p: clamp(0, calc((var(--t) - var(--cta-start)) / var(--cta-dur)), 1);
            --cta-ease: calc(1 - (1 - var(--cta-p)) * (1 - var(--cta-p)));

            opacity: var(--cta-ease);
            transform: scale(calc(0.9 + 0.1 * var(--cta-ease)));
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="core-concept">
            <div class="equation">AI Agent = 自动员工</div>
            <div class="sub-equation">赚钱项目 = 自动员工 + 生意模型</div>
        </div>

        <div class="ranking-table">
            <div class="table-row table-header">
                <div class="col-1">项目</div>
                <div class="col-2">难度</div>
                <div class="col-3">收入潜力</div>
            </div>
            <div class="table-row">
                <div class="col-1">AI 内容矩阵</div>
                <div class="col-2">低</div>
                <div class="col-3">中</div>
            </div>
            <div class="table-row">
                <div class="col-1">SEO 网站农场</div>
                <div class="col-2">中</div>
                <div class="col-3">高</div>
            </div>
            <div class="table-row highlight-row">
                <div class="col-1">AI 外包工作室</div>
                <div class="col-2">中</div>
                <div class="col-3" style="color:#22c55e">极高</div>
            </div>
            <div class="table-row highlight-row">
                <div class="col-1">AI SaaS 运营</div>
                <div class="col-2">高</div>
                <div class="col-3" style="color:#22c55e">极高</div>
            </div>
        </div>

        <div class="call-to-action">
            关注我，获取 $10k/月 完整架构
        </div>

    </div>
</body>

</html>
