<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 85%;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(34, 197, 94, 0.5);
            border-radius: 40px;
            padding: 60px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(34, 197, 94, 0.2);

            --start: 0.1;
            --duration: 0.8;
            --p: clamp(0, calc((var(--t) - var(--start)) / var(--duration)), 1);
            --ease-out: calc(1 - (1 - var(--p)) * (1 - var(--p)));

            opacity: var(--ease-out);
            transform: scale(calc(0.9 + 0.1 * var(--ease-out)));
        }

        .header {
            font-size: 70px;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 20px;
        }

        .title {
            font-size: 85px;
            font-weight: bold;
            margin-bottom: 50px;
            background: linear-gradient(to right, #ffffff, #bbf7d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .image-container {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);

            --img-start: 1;
            --img-dur: 1;
            --img-p: clamp(0, calc((var(--t) - var(--img-start)) / var(--img-dur)), 1);
            --img-ease: calc(1 - (1 - var(--img-p)) * (1 - var(--img-p)));

            opacity: var(--img-ease);
            transform: translateY(calc((1 - var(--img-ease)) * 30px));
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 20px;

            --f-start: 2;
            --f-dur: 0.8;
            --f-p: clamp(0, calc((var(--t) - var(--f-start)) / var(--f-dur)), 1);
            --f-ease: calc(1 - (1 - var(--f-p)) * (1 - var(--f-p)));

            opacity: var(--f-ease);
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px 40px;
            border-radius: 20px;
            font-size: 40px;
            display: flex;
            align-items: center;
        }

        .feature::before {
            content: "✓";
            color: #4ade80;
            font-weight: bold;
            margin-right: 20px;
            font-size: 50px;
        }

        .revenue {
            margin-top: 40px;
            text-align: center;
            font-size: 55px;
            font-weight: 800;
            color: #facc15;
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);

            --r-start: 3;
            --r-dur: 0.5;
            --r-p: clamp(0, calc((var(--t) - var(--r-start)) / var(--r-dur)), 1);
            --r-ease: calc(1 - (1 - var(--r-p)) * (1 - var(--r-p)));
            opacity: var(--r-ease);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">02</div>
        <div class="title">AI 自动 SEO 网站农场</div>

        <div class="image-container">
            <img src="https://cdn.prod.website-files.com/627a5f477d5ec9079c88f0e2/650812c479a153fadb161076_best-writing-assistant-seo-ai.jpg"
                alt="SEO AI">
        </div>

        <div class="features">
            <div class="feature">一个人可跑 50 - 500 个内容站</div>
            <div class="feature">每天自动生成 100+ 篇文章</div>
        </div>

        <div class="revenue">
            预计月入: $2k - $20k / 月
        </div>
    </div>
</body>

</html>
