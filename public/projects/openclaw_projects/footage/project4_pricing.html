<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .pricing-container {
            position: absolute;
            top: 1300px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .pricing-box {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(244, 114, 182, 0.4);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .pricing-value {
            font-size: 65px;
            font-weight: 900;
            color: #f472b6;
            margin-bottom: 15px;
        }

        .pricing-label {
            font-size: 35px;
            color: #cbd5e1;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="pricing-container">
        <div class="pricing-box">
            <div class="pricing-value">$500 – $5000</div>
            <div class="pricing-label">一套 B2B 客户名单的平均售价</div>
        </div>
    </div>
</body>

</html>
