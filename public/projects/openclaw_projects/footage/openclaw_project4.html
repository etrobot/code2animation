<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --t: 0;
        }

        body {
            margin: 0;
            width: 1080px;
            height: 1920px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 85%;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(236, 72, 153, 0.5);
            border-radius: 40px;
            padding: 60px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(236, 72, 153, 0.2);

            --start: 0.1;
            --duration: 0.8;
            --p: clamp(0, calc((var(--t) - var(--start)) / var(--duration)), 1);
            --ease-out: calc(1 - (1 - var(--p)) * (1 - var(--p)));

            opacity: var(--ease-out);
            transform: scale(calc(0.9 + 0.1 * var(--ease-out)));
        }

        .header {
            font-size: 70px;
            font-weight: 800;
            color: #f472b6;
            margin-bottom: 20px;
        }

        .title {
            font-size: 85px;
            font-weight: bold;
            margin-bottom: 50px;
            background: linear-gradient(to right, #ffffff, #fbcfe8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .image-container {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);

            --img-start: 1;
            --img-dur: 1;
            --img-p: clamp(0, calc((var(--t) - var(--img-start)) / var(--img-dur)), 1);
            --img-ease: calc(1 - (1 - var(--img-p)) * (1 - var(--img-p)));

            opacity: var(--img-ease);
            transform: translateY(calc((1 - var(--img-ease)) * 30px));
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .workflow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;

            --w-start: 2;
            --w-dur: 0.8;
            --w-p: clamp(0, calc((var(--t) - var(--w-start)) / var(--w-dur)), 1);
            --w-ease: calc(1 - (1 - var(--w-p)) * (1 - var(--w-p)));

            opacity: var(--w-ease);
        }

        .step {
            font-size: 30px;
            text-align: center;
            flex: 1;
        }

        .arrow {
            font-size: 40px;
            color: #f472b6;
            margin: 0 10px;
        }

        .pricing {
            margin-top: 50px;
            text-align: center;
            font-size: 55px;
            font-weight: 800;
            color: #fbbf24;

            --price-start: 3;
            --price-dur: 0.5;
            --price-p: clamp(0, calc((var(--t) - var(--price-start)) / var(--price-dur)), 1);
            --price-ease: calc(1 - (1 - var(--price-p)) * (1 - var(--price-p)));
            opacity: var(--price-ease);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">04</div>
        <div class="title">AI 线索抓取 (B2B赚钱)</div>

        <div class="image-container">
            <img src="https://infyom.com/images/workflows/linkedin-outreach-automation.webp" alt="Automated Outreach">
        </div>

        <div class="workflow">
            <div class="step">浏览企业网站</div>
            <div class="arrow">→</div>
            <div class="step">找核心联系人</div>
            <div class="arrow">→</div>
            <div class="step">自动发个性邮件</div>
        </div>

        <div class="pricing">
            一套客户名单 $500–$5000
        </div>
    </div>
</body>

</html>
